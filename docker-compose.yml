version: "3.8"

services:
  # -------------------------
  # MongoDB Database
  # -------------------------
  mongodb:
    image: mongo:latest
    container_name: orion-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------
  # Backend (MCP API Gateway)
  # -------------------------
  api:
    build: ./api-gateway
    container_name: orion-api
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URL: mongodb://mongodb:27017
      LLM_API_KEY: ${LLM_API_KEY}
      WEB_API_KEY: ${WEB_API_KEY}
    restart: unless-stopped

  # -------------------------
  # Frontend (Vite + React)
  # -------------------------
  frontend:
    build: ./frontend
    container_name: orion-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:8000
    restart: unless-stopped

# -------------------------
# Persistent Storage
# -------------------------
volumes:
  mongo_data: